name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          prefix-key: v0-rust

      - name: Install Tauri CLI + cargo-ndk
        run: |
          echo '{"name":"alectra","version":"1.0.0","scripts":{"tauri":"tauri"}}' > package.json
          npm install --no-save @tauri-apps/cli@latest
          cargo install cargo-ndk

      - name: Remove stale generated Android project
        run: rm -rf src-tauri/gen/android

      - name: Initialise Android project
        run: npx tauri android init

      - name: Inject custom launcher icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            dest="src-tauri/gen/android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dest"
            cp "src-tauri/android-res/mipmap-${density}/ic_launcher.png"            "$dest/"
            cp "src-tauri/android-res/mipmap-${density}/ic_launcher_round.png"      "$dest/"
            cp "src-tauri/android-res/mipmap-${density}/ic_launcher_foreground.png" "$dest/"
          done
          echo "Icons injected."

      - name: Inject adaptive icon XML + brand colour
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26
          cat > src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          COLORS="src-tauri/gen/android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS" ]; then
            sed -i 's|<color name="ic_launcher_background">[^<]*</color>|<color name="ic_launcher_background">#FF9800</color>|' "$COLORS"
            echo "Patched brand colour in colors.xml"
          else
            mkdir -p "$(dirname "$COLORS")"
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#FF9800</color>\n</resources>\n' > "$COLORS"
            echo "Created colors.xml"
          fi
          rm -f "src-tauri/gen/android/app/src/main/res/values/ic_launcher_background.xml"

      - name: Patch AndroidManifest (allowBackup=false)
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="false"/' "$MANIFEST"

      - name: Build Android AAB
        id: build_aab
        continue-on-error: true
        run: npx tauri android build 2>&1 | tee /tmp/tauri-build.log; exit ${PIPESTATUS[0]}

      - name: Collect build diagnostics
        if: always()
        run: |
          echo "=== Build outcome: ${{ steps.build_aab.outcome }} ==="
          LOG=/tmp/tauri-build.log
          if [ -f "$LOG" ]; then
            echo ""; echo "=== Last 120 lines of build log ==="
            tail -120 "$LOG"
            echo ""
            echo "══════════════════════════════════════════════════"
            echo "=== COMPILER / KOTLIN ERROR LINES (from full log) ==="
            echo "══════════════════════════════════════════════════"
            grep -n "error:\|^e:\| e: \|Unresolved\|None of the following\|Type mismatch\|Exception\|BUILD FAILED" "$LOG" | head -200 \
              || echo "(no matching lines — download artifact for full log)"
          fi
          echo ""; echo "=== Kotlin daemon / worker session logs ==="
          find /home/runner/.gradle -name "*.log" 2>/dev/null | head -5 | while read f; do
            echo "--- $f ---"
            grep -i "error\|exception\|^e:" "$f" 2>/dev/null | head -50 || true
          done || echo "(none)"

      - name: Upload build diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: |
            /tmp/tauri-build.log
            src-tauri/gen/android/build/reports/
            src-tauri/gen/android/app/build/reports/
            /home/runner/.gradle/kotlin/
          retention-days: 3
          if-no-files-found: ignore

      - name: Fail if build failed
        if: steps.build_aab.outcome == 'failure'
        run: |
          echo "Build failed — see diagnostics above or download the artifact."
          exit 1

      - name: Find AAB
        id: find_aab
        run: |
          AAB=$(find src-tauri/gen/android -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          echo "AAB: $AAB"

      - name: Sign AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        id: sign_aab
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          VERSION=$(node -p "require('./package.json').version")
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/release.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass  "$KEY_PASSWORD" \
            -signedjar "/tmp/alectra-v${VERSION}-signed.aab" \
            "${{ steps.find_aab.outputs.aab_path }}" \
            "$KEY_ALIAS"
          echo "signed_aab=/tmp/alectra-v${VERSION}-signed.aab" >> $GITHUB_OUTPUT

      - name: Upload signed AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab-signed
          path: ${{ steps.sign_aab.outputs.signed_aab }}
          retention-days: 30

      - name: Upload unsigned AAB (no keystore yet)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab-unsigned
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30
