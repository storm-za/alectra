name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;25.2.9519653"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-android-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install --no-save @tauri-apps/cli@2.0.4

      - name: Add tauri script for Gradle integration
        run: npm pkg set scripts.tauri="tauri"

      - name: Create dist directory
        run: mkdir -p dist/public

      - name: Initialise Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - name: Patch generated Android project
        run: |
          D="src-tauri/gen/android"

          # ── 1. Dump generated files for diagnostics ──────────────────────
          for f in \
            settings.gradle.kts \
            build.gradle.kts \
            app/build.gradle.kts \
            buildSrc/build.gradle.kts \
            tauri-android/build.gradle.kts \
            gradle/wrapper/gradle-wrapper.properties; do
            echo ""; echo "=== $f ==="; cat "$D/$f" 2>/dev/null || echo "(missing)"
          done

          # ── 2. Gradle wrapper → 8.13 (required by AGP 8.5.x) ────────────
          sed -i 's|gradle-[0-9]*\.[0-9]*\.*[0-9]*-bin.zip|gradle-8.13-bin.zip|g' \
            "$D/gradle/wrapper/gradle-wrapper.properties"

          # ── 3. Repository mode: switch FAIL_ON_PROJECT_REPOS → PREFER_PROJECT ──
          # Detached configurations in the Tauri Gradle plugin bypass settings-level
          # repos; PREFER_PROJECT allows project-level repos to fill the gap.
          sed -i 's/RepositoriesMode\.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_PROJECT/g' \
            "$D/settings.gradle.kts" 2>/dev/null || true

          # ── 4. Ensure settings.gradle.kts has google() + mavenCentral() ─
          python3 << 'PYEOF'
import re, sys
path = 'src-tauri/gen/android/settings.gradle.kts'
try:
    c = open(path).read()
    # If dependencyResolutionManagement exists but repos block is missing/empty
    drm = 'dependencyResolutionManagement'
    if drm in c:
        after = c[c.index(drm):]
        block = after[:after.index('}')+1]
        if 'google()' not in block:
            c = c.replace(drm + ' {', drm + ' {\n    repositories {\n        google()\n        mavenCentral()\n    }')
    else:
        c += '\ndependencyResolutionManagement {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n'
    open(path, 'w').write(c)
    print('settings.gradle.kts patched')
except Exception as e:
    print('settings patch skipped:', e)
PYEOF

          # ── 5. Root build.gradle.kts → allprojects repos (covers detached configs) ──
          ROOT="$D/build.gradle.kts"
          if ! grep -q "allprojects" "$ROOT"; then
            printf '\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n' >> "$ROOT"
            echo "Patched root build.gradle.kts"
          fi

          # ── 6. buildSrc needs its own repos (separate Gradle build) ──────
          BUILDSRC="$D/buildSrc/build.gradle.kts"
          if [ -f "$BUILDSRC" ] && ! grep -q "mavenCentral" "$BUILDSRC"; then
            printf '\nrepositories {\n    google()\n    mavenCentral()\n    gradlePluginPortal()\n}\n' >> "$BUILDSRC"
            echo "Patched buildSrc/build.gradle.kts"
          fi

          # ── 7. tauri-android subproject: same treatment ───────────────────
          TAURI_ANDROID="$D/tauri-android/build.gradle.kts"
          if [ -f "$TAURI_ANDROID" ] && ! grep -q "repositories" "$TAURI_ANDROID"; then
            printf '\nrepositories {\n    google()\n    mavenCentral()\n}\n' >> "$TAURI_ANDROID"
            echo "Patched tauri-android/build.gradle.kts"
          fi

          # ── 8. Remove rust{} extension props incompatible with Kotlin DSL ─
          APP="$D/app/build.gradle.kts"
          sed -i '/^\s*targets\s*=/d' "$APP"
          sed -i '/^\s*arches\s*=/d'  "$APP"

          # ── 9. Print final state ─────────────────────────────────────────
          echo ""; echo "=== AFTER PATCH: settings.gradle.kts ==="
          cat "$D/settings.gradle.kts"
          echo ""; echo "=== AFTER PATCH: build.gradle.kts ==="
          cat "$D/build.gradle.kts"
          echo ""; echo "=== AFTER PATCH: buildSrc/build.gradle.kts ==="
          cat "$D/buildSrc/build.gradle.kts" 2>/dev/null || echo "(missing)"

      - name: Copy launcher icons
        run: |
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            dest="src-tauri/gen/android/app/src/main/res/${density}"
            mkdir -p "$dest"
            cp "src-tauri/android-res/${density}/ic_launcher.png" "$dest/"
            cp "src-tauri/android-res/${density}/ic_launcher_round.png" "$dest/"
            cp "src-tauri/android-res/${density}/ic_launcher_foreground.png" "$dest/"
          done

      - name: Add adaptive icon resources
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26
          cat > src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             src-tauri/gen/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          mkdir -p src-tauri/gen/android/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#FF9800</color>\n</resources>\n' \
            > src-tauri/gen/android/app/src/main/res/values/ic_launcher_background.xml

      - name: Patch AndroidManifest (allowBackup=false)
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="false"/' "$MANIFEST"
          sed -i 's/android:allowBackup="[^"]*"/android:allowBackup="false"/' "$MANIFEST"

      - name: Build Android AAB
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - name: Find AAB file
        id: find_aab
        run: |
          AAB_PATH=$(find src-tauri/gen/android -name "*.aab" -type f | head -1)
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "Found AAB at: $AAB_PATH"

      - name: Check keystore availability
        id: keystore_check
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.keystore_check.outputs.available == 'true'
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Sign AAB
        if: steps.keystore_check.outputs.available == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner -verbose \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -signedjar /tmp/alectra-signed.aab \
            "${{ steps.find_aab.outputs.aab_path }}" \
            "$KEY_ALIAS"

      - name: Upload signed AAB
        if: steps.keystore_check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab
          path: /tmp/alectra-signed.aab
          retention-days: 30

      - name: Upload unsigned AAB
        if: steps.keystore_check.outputs.available == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab-unsigned
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30
