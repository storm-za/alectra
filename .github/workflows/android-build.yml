name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;25.2.9519653"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-android-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install --no-save @tauri-apps/cli@latest

      - name: Build frontend
        run: npx vite build --outDir ../dist/public
        working-directory: client

      - name: Build Android AAB
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - name: Find AAB file
        id: find_aab
        run: |
          AAB_PATH=$(find src-tauri/gen/android -name "*.aab" -type f | head -1)
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "Found AAB at: $AAB_PATH"

      - name: Check keystore availability
        id: keystore_check
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.keystore_check.outputs.available == 'true'
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Sign AAB
        if: steps.keystore_check.outputs.available == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner -verbose \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -signedjar /tmp/alectra-signed.aab \
            "${{ steps.find_aab.outputs.aab_path }}" \
            "$KEY_ALIAS"

      - name: Upload signed AAB
        if: steps.keystore_check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab
          path: /tmp/alectra-signed.aab
          retention-days: 30

      - name: Upload unsigned AAB
        if: steps.keystore_check.outputs.available == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: alectra-android-aab-unsigned
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30
